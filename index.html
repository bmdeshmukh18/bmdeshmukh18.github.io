<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Hub</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXX');
  </script>
</head>
<body>

  <header>
    <h1>🎬 Movie Hub</h1>
    <p class="subtitle">Simple demo for tracking page views</p>
  </header>

  <section class="stats">
    <div id="counter">Page Views: Loading...</div>
    <div id="note">Comparing Firebase vs Analytics</div>
  </section>

  <section class="movie-list">
    <div class="movie-card">Inception</div>
    <div class="movie-card">Interstellar</div>
    <div class="movie-card">The Dark Knight</div>
    <div class="movie-card">Avengers: Endgame</div>
    <div class="movie-card">Joker</div>
  </section>

  <footer>
    <p>© 2026 Movie Hub</p>
  </footer>

  <!-- Firebase Counter Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, updateDoc, increment, getDoc, setDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAfELOvrp3_Dye4L2n4aZ9KiaICauV6avY",
      authDomain: "moviewebappbmd18.firebaseapp.com",
      projectId: "moviewebappbmd18"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const counterRef = doc(db, "counters", "homepage");

    async function updateCounter() {
      try {
        const snap = await getDoc(counterRef);

        if (!snap.exists()) {
          await setDoc(counterRef, { count: 1 });
          document.getElementById("counter").innerText = "Page Views: 1";
        } else {
          await updateDoc(counterRef, {
            count: increment(1)
          });

          const updated = await getDoc(counterRef);
          document.getElementById("counter").innerText =
            "Page Views: " + updated.data().count;
        }
      } catch (err) {
        console.error(err);
        document.getElementById("counter").innerText =
          "Page Views: Error loading counter";
      }
    }

    // Optional: delay to avoid counting bounces
    setTimeout(updateCounter, 2000);
  </script>

</body>
</html>
